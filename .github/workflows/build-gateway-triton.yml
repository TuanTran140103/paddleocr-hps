name: Build and Push Gateway-Triton Docker Image

on:
  push:
    paths:
      - 'gateway-triton.Dockerfile'
      - 'gateway/**'
      - 'paddlex_hps_PaddleOCR-VL-1.5_sdk/client/**'
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (optional)'
        required: false
        default: 'latest'
  # Trigger khi build Triton image hoàn thành
  workflow_run:
    workflows: ["Build and Push Triton Docker Image"]
    types:
      - completed
    branches:
      - main
      - master

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/paddleocr-gateway-triton

jobs:
  build-docker:
    runs-on: ubuntu-latest
    # Skip nếu workflow_run trigger từ workflow khác failed
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(git rev-parse --short ${{ github.sha }})
            echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gateway-triton.Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}
            ${{ env.DOCKER_IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "=========================================="
          echo "🎉 Build completed successfully!"
          echo "=========================================="
          echo "Image: ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"
          echo "Pull command: docker pull ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.tag.outputs.tag }}"
          echo "=========================================="
